# v1.4 strategy-sweep — 8-strategy explainer evidence.
#
# Tests all 8 strategies on the same (agent, model, task-set) cell so
# the docs/ROUTING_STRATEGIES.md beginner explainer has measured numbers.
#
# 8 strategies × 1 agent (aider) × 1 model (gemma4) × 8 tasks × 3 seeds = 192 rows, ~3h.
# Run with --strategies explicitly passing all 8.

# yaml-language-server: $schema=./schema.json

variant_tag: v1.4-strategy-sweep
out_dir: results/runs/v1.4-strategy-sweep

models:
  cloud: gpt-5.5
  local: gemma4:31b

router:
  strategy: heuristic
  port: 8787
  banner: true

benchmark:
  task_classes: [puzzles, refactors]
  agents: [aider]
  seeds: [42, 7, 13]
  smoke: false
  tasks_per_class:
    puzzles: 5
    refactors: 3
  task_ids:
    - exercism-python/grep
    - exercism-python/list-ops
    - exercism-python/phone-number
    - exercism-python/robot-name
    - exercism-python/pig-latin
    - real-dev/d1-rate-limit
    - real-dev/d1-retry-decorator
    - real-dev/d5-todo-counter

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
