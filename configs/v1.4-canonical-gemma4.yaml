# v1.4 CANONICAL — gemma4-first (the headline proof)
#
# 4 agents × 4 strategies × 13 tasks × 3 seeds = 624 rows, ~10h on M4 Max 64GB.
#
# Agent matrix (4 protocol shapes):
#   - aider           — architect/editor (v1.3 winner)
#   - opencode        — free-form tool-use ReAct
#   - cline           — Plan/Act ReAct
#   - (mini-swe-agent NOT in this config — it requires SWE-bench real-PR
#      tasks, run separately via v1.4-canonical-real-prs.yaml)
#
# Strategy matrix (4 most-informative for the headline):
#   - always-cloud (control / ceiling)
#   - always-local (control / floor)
#   - heuristic    (v1.3 winner)
#   - cascade      (the v3.3 plain-chat winner)
#
# Task matrix (13 tasks):
#   - 5 puzzles  (Exercism Python)
#   - 8 refactors (real_dev D1+D5)
#
# Repro:
#   ./bench sweep --config configs/v1.4-canonical-gemma4.yaml \
#       --strategies always-cloud,always-local,heuristic,cascade --seeds 42,7,13

# yaml-language-server: $schema=./schema.json

variant_tag: v1.4-canonical-gemma4
out_dir: results/runs/v1.4-canonical-gemma4

models:
  cloud: gpt-5.5
  local: gemma4:31b

router:
  strategy: heuristic
  port: 8787
  banner: true

benchmark:
  task_classes: [puzzles, refactors]
  agents: [aider, opencode, cline]
  seeds: [42, 7, 13]
  smoke: false
  tasks_per_class:
    puzzles: 5
    refactors: 8
  task_ids:
    # Exercism puzzles
    - exercism-python/grep
    - exercism-python/list-ops
    - exercism-python/phone-number
    - exercism-python/robot-name
    - exercism-python/pig-latin
    # real_dev D1 (single-file feature)
    - real-dev/d1-rate-limit
    - real-dev/d1-retry-decorator
    - real-dev/d1-json-schema
    - real-dev/d1-auth-login
    # real_dev D5 (small util / script)
    - real-dev/d5-todo-counter
    - real-dev/d5-csv-dedupe
    - real-dev/d5-log-errors-today
    - real-dev/d5-env-var-redactor

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5

scoring:
  skip: false
  swebench_image: hybrid-eval-python:latest

resume: false
