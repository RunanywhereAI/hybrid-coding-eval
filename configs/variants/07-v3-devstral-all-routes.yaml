# v3 full sweep — devstral:24b local, gpt-5.5 cloud, all four categories
# × all five routes × seed 42. Drives the headline 250-row dataset
# (A=10 + B=10 + C=10 + D=20 = 50 tasks × 5 routes = 250 pairs) for the
# final v3 report. No tasks_per_category override — the per-category
# totals come from the datasets as shipped.
#
# D2 rows will score functional_pass=None under the current SWE-bench
# harness (which hard-codes princeton-nlp/SWE-bench_Verified and does
# not yet handle external GitHub issues). Those rows still land in
# raw.jsonl so the P3.3 judge pass and final report can consume them.

# yaml-language-server: $schema=../schema.json

variant_tag: v3-devstral-all-routes
out_dir: results/runs/07-v3-devstral-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: devstral:24b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R1, R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
