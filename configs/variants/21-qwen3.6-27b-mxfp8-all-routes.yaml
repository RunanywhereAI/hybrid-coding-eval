# v3.3 Phase 9 — qwen3.6:27b-coding-mxfp8 (Qwen 3.6 "Precision King")
#
# Local model: qwen3.6:27b-coding-mxfp8 (~31 GB, 8-bit float precision)
# Already on disk — no pull needed.
#
# Why this variant:
#   - Latest Qwen 3.6 generation (newer than Qwen3-Coder family)
#   - mxfp8 = 8-bit float quantization — the highest precision that
#     fits comfortably on 64 GB M4 Max with room for context + sweep
#     orchestrator. True bf16 (54 GB) would push memory pressure
#     unacceptably high. The "27b-coding-bf16" tag is gated on Ollama
#     registry (HTTP 412) so mxfp8 IS the practical max for this hw.
#   - Code-specialized variant of the Qwen 3.6 family
#
# Same invocation pattern as variant 17 (see that file's comments).

# yaml-language-server: $schema=../schema.json

variant_tag: v3.3-qwen3.6-27b-mxfp8
out_dir: results/runs/21-qwen3.6-27b-mxfp8-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: qwen3.6:27b-coding-mxfp8
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
