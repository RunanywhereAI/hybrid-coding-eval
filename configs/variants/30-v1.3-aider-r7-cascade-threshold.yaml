# v1.3 ROUTER_CASCADE_THRESHOLD sweep on R7 Aider.
#
# v1.2.0 used the default cascade threshold (15) and the strategy under-
# performed heuristic (3/15 vs 6/15). Hypothesis: there's a different
# threshold where cascade's local-first-then-escalate pattern wins.
#
# Reproducer:
#
#   ./bench sweep \
#       --config configs/variants/30-v1.3-aider-r7-cascade-threshold.yaml \
#       --strategies cascade \
#       --cascade-thresholds 5,10,15,20,25 \
#       --seeds 42,7,13
#
# The ``--cascade-thresholds`` flag spawns a fresh router proxy per
# threshold (router/server.mjs reads ROUTER_CASCADE_THRESHOLD at startup)
# and writes results to results/runs/30-…/cascade-threshold-<N>/seed-<S>/.
#
# Pre-flight: kill any router on :8787 — the sweep manages its own.

# yaml-language-server: $schema=../schema.json

variant_tag: v1.3-aider-r7-cascade-threshold
out_dir: results/runs/30-v1.3-aider-r7-cascade-threshold

models:
  cloud: gpt-5.5
  local: qwen3-coder:30b

router:
  strategy: cascade
  port: 8787
  banner: true

benchmark:
  categories: [X, D]
  routes: [R7]
  seeds: [42, 7, 13]
  smoke: false
  tasks_per_category:
    X: 5
    D: 8
  task_ids:
    - exercism-python/grep
    - exercism-python/list-ops
    - exercism-python/phone-number
    - exercism-python/robot-name
    - exercism-python/pig-latin
    - real-dev/d1-rate-limit
    - real-dev/d1-retry-decorator
    - real-dev/d1-json-schema
    - real-dev/d1-auth-login
    - real-dev/d5-todo-counter
    - real-dev/d5-csv-dedupe
    - real-dev/d5-log-errors-today
    - real-dev/d5-env-var-redactor

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
