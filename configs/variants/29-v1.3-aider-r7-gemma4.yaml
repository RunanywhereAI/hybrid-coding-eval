# v1.3 R7 Aider with gemma4:31b (dense) as local model.
#
# Hypothesis: qwen3-coder:30b is a coding-specialised MoE; gemma4:31b is
# a generalist dense model. Within an agentic loop (R7 architect/editor),
# does the dense generalist match the MoE specialist on small Exercism +
# real_dev tasks?
#
# Same expanded task set as 28-v1.3-aider-r7-expanded.yaml so the only
# axis that varies is the local model.

# yaml-language-server: $schema=../schema.json

variant_tag: v1.3-aider-r7-gemma4
out_dir: results/runs/29-v1.3-aider-r7-gemma4

models:
  cloud: gpt-5.5
  # Pre-requisite: ``ollama pull gemma4:31b``
  local: gemma4:31b

router:
  strategy: heuristic
  port: 8787
  banner: true

benchmark:
  categories: [X, D]
  routes: [R7]
  seeds: [42, 7, 13]
  smoke: false
  tasks_per_category:
    X: 5
    D: 8
  task_ids:
    - exercism-python/grep
    - exercism-python/list-ops
    - exercism-python/phone-number
    - exercism-python/robot-name
    - exercism-python/pig-latin
    - real-dev/d1-rate-limit
    - real-dev/d1-retry-decorator
    - real-dev/d1-json-schema
    - real-dev/d1-auth-login
    - real-dev/d5-todo-counter
    - real-dev/d5-csv-dedupe
    - real-dev/d5-log-errors-today
    - real-dev/d5-env-var-redactor

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
