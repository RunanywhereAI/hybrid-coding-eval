# Smoke test for v3 — one task per category × cheapest route (R1) +
# new route (R5). Catches most breakage before the full 250-row sweep:
# R1 exercises the cloud-direct path (no router, no local executor)
# and R5 exercises the Stanford DevMinion architect/editor review loop
# (newest addition). Under 15 min wall clock.
#
# Scope: 4 categories × 2 routes × 1 task each = 8 pairs.

# yaml-language-server: $schema=../schema.json

variant_tag: smoke-v3
out_dir: results/runs/_smoke-v3

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: devstral:24b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R1, R5]
  seeds: [42]
  tasks_per_category: { A: 1, B: 1, C: 1, D: 1 }

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
