# Strategy sweep — heuristic (baseline replica of v3 R3, isolated)
#
# v3.2 strategy sweep: each variant runs R3 only across the 50-task v3 set
# (A=10 + B=10 + C=10 + D=20), exercising one router strategy per run.
# Together with variants 13-16, this produces a 5×50=250-row strategy
# sweep that fills the gap §8.4 of reports/ARTICLE.md called out.
#
# This variant (heuristic) replicates what R3 did in run 07 but in
# isolation so cost + cloud_fraction are directly comparable to 13-16.
# Expected runtime: ~2.5h wall. Expected cost: ~$8.65 OpenAI gpt-5.5.

# yaml-language-server: $schema=../schema.json

variant_tag: v3.2-r3-strategy-heuristic
out_dir: results/runs/12-r3-strategy-heuristic

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: devstral:24b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R3]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
