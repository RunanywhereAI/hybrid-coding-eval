# v3.3 — gemma4:26b local (Google Gemma 4, latest dense)
#
# Local model: gemma4:26b (~16.8 GB Q4_K_M)
# Google's Gemma 4 family ships 26b + 31b dense variants plus e2b/e4b
# lightweights. 26b is the canonical "latest dense" pick that matches
# the v3 devstral:24b memory class.
#
# Same invocation pattern as variant 17 (see that file's comments).

# yaml-language-server: $schema=../schema.json

variant_tag: v3.3-gemma4-26b
out_dir: results/runs/20-gemma4-26b-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: gemma4:26b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
