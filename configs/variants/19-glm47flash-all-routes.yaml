# v3.3 — glm-4.7-flash local (SUBSTITUTE for GLM-4.5-Air)
#
# The owner originally requested GLM-4.5-Air. Zhipu's GLM-4.5-Air is
# not in the Ollama default registry as of v3.3 release time. The
# closest variant available is glm-4.7-flash (~17.7 GB Q4_K_M):
#   - 4.7 is a more recent generation than 4.5
#   - "flash" is Zhipu's lightweight/efficient variant (analogous to
#     "air" naming)
# This is the cleanest in-spirit substitute. If GLM-4.5-Air ships to
# Ollama later, swap models.local back to glm-4.5-air and re-run.
#
# Same invocation pattern as variant 17 (see that file's comments).

# yaml-language-server: $schema=../schema.json

variant_tag: v3.3-glm-4.7-flash
out_dir: results/runs/19-glm47flash-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: glm-4.7-flash
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
