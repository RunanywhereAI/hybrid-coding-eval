# v3.3 — qwen3-coder:30b local across all routes + all 7 router strategies
#
# Local model: qwen3-coder:30b (~17 GB Q4_K_M)
# This is Alibaba's Qwen3 family code-specialized variant. The user
# originally requested "Qwen3-Coder 30B-A3B" — Ollama's canonical tag
# `qwen3-coder:30b` is the available variant.
#
# Routes covered:
#   R2, R4, R5: heuristic strategy (route protocols force backends by role)
#   R3:        configurable via --set router.strategy=<name>
#   R1:        skipped — already in run 07 (cloud-only, doesn't depend on local model)
#
# Strategy sweep recipe — see docs/REPRODUCING.md and ARTICLE.md §8.4.
# Per-strategy invocation pattern:
#   ./bench run --config configs/variants/17-qwen3coder-all-routes.yaml \
#     --set benchmark.routes='["R3"]' \
#     --set router.strategy=<rules|llm-classifier|embedding-knn|cascade> \
#     --set out_dir="results/runs/17-qwen3coder-all-routes-<strategy>"
#
# Heuristic baseline (R2 + R3 + R4 + R5) is the default invocation:
#   ./bench run --config configs/variants/17-qwen3coder-all-routes.yaml \
#     --set benchmark.routes='["R2","R3","R4","R5"]'

# yaml-language-server: $schema=../schema.json

variant_tag: v3.3-qwen3coder-30b
out_dir: results/runs/17-qwen3coder-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: qwen3-coder:30b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
