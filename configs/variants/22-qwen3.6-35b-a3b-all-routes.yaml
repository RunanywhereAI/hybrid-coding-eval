# v3.3 Phase 9 — qwen3.6:35b (Qwen 3.6 35B-A3B "MoE Efficiency Pick")
#
# Local model: qwen3.6:35b (~22 GB Q4 default)
# Mixture-of-Experts architecture: 35B total params, only 3B active per
# token generation. The "A3B" notation = "Active 3B." This means:
#   - Inference cost (compute + KV cache) is like a 3B model
#   - Memory cost (parameter storage) is like a 35B model
#   - Per-token speed should be materially faster than dense 27B/30B
# Trade-off: MoE routing adds some prefill overhead; gains show up on
# longer-completion tasks (B SWE-bench, D2 GH-issues).
#
# Same invocation pattern as variant 17 (see that file's comments).

# yaml-language-server: $schema=../schema.json

variant_tag: v3.3-qwen3.6-35b-a3b
out_dir: results/runs/22-qwen3.6-35b-a3b-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: qwen3.6:35b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
