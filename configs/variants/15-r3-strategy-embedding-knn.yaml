# Strategy sweep — embedding-knn (top-5 cosine kNN against labelled corpus)
#
# v3.2 strategy sweep: R3 only, 50 tasks. Routes each step by finding the
# 5 most cosine-similar examples in configs/router/corpus.json (50-example
# hand-labelled corpus) and voting. See variants 12-16. Expected runtime
# ~2.5-3h wall (one embedding call per step), ~$8.65 OpenAI gpt-5.5.
# Requires `ollama pull nomic-embed-text` (137 MB embedding model).

# yaml-language-server: $schema=../schema.json

variant_tag: v3.2-r3-strategy-embedding-knn
out_dir: results/runs/15-r3-strategy-embedding-knn

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: devstral:24b
  judge: claude-opus-4-7

router:
  strategy: embedding-knn

benchmark:
  categories: [A, B, C, D]
  routes: [R3]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
