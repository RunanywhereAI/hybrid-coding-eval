# v3.3 — qwen2.5-coder:32b local (SUBSTITUTE for Llama 4 Scout)
#
# The owner originally requested Llama 4 Scout. Ollama hosts it at
# llama4:scout but the manifest is 62.8 GB which does not fit on a
# 64 GB M4 Max with room for context + OS. No quantized Scout variant
# is published in the Ollama default registry at v3.3 release time.
#
# Substituted with qwen2.5-coder:32b (Alibaba, ~18.5 GB Q4_K_M,
# code-specialized) for the v3.3 sweep. Similar size class, same
# Q4 quantization, comparable code-bench landing zone.
#
# Same invocation pattern as variant 17 (see that file's comments).

# yaml-language-server: $schema=../schema.json

variant_tag: v3.3-qwen2.5coder-32b
out_dir: results/runs/18-qwen2.5coder-all-routes

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: qwen2.5-coder:32b
  judge: claude-opus-4-7

router:
  strategy: heuristic

benchmark:
  categories: [A, B, C, D]
  routes: [R2, R3, R4, R5]
  seeds: [42]

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5
