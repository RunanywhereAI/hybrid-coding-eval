# v4.1 — agent-hybrid sweep with Qwen3-Coder 30B-A3B as local + new
# agent-heuristic strategy. Builds on v4 (run 17) which showed:
#   - R6 cloud-only: 6/6 PASS on SWE-Verified
#   - R6 local-only: 0/2 timeouts with devstral-24B (3 weren't even attempted)
#   - R6 heuristic: routes 100% cloud → equivalent to always-cloud
#
# v4.1 changes:
#   - models.local = qwen3-coder:30b  (was devstral:24b)
#   - Adds agent-heuristic to the routing-strategy axis
#   - Same task subset for direct comparison
#
# Orchestrator (bin/v4.1-sweep.sh) runs this YAML 4 times, once per
# strategy in {always-cloud, always-local, heuristic, agent-heuristic},
# all into the same out_dir (resume-safe per (task, route, strategy)).
#
# yaml-language-server: $schema=../schema.json

variant_tag: v4.1-qwen3coder-agent
out_dir: results/runs/18-v4.1-qwen3coder-agent

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: qwen3-coder:30b              # CHANGED from devstral:24b
  judge: claude-opus-4-7

router:
  strategy: agent-heuristic
  port: 8787
  banner: true
  prompt_cache: false

benchmark:
  categories: [B, X, D]
  routes: [R6, R7, R8]
  seeds: [42]
  smoke: false
  tasks_per_category: {B: 6, X: 5, D: 4}

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
