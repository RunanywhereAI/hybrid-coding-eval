# v4 — agent-loop hybrid routing overnight sweep.
#
# Three real coding agents (R6 mini-swe-agent, R7 aider, R8 opencode) run
# the same tasks under three routing strategies (always-cloud, always-local,
# heuristic) via this repo's router proxy. This is the v3 sweep's
# orchestration-axis sibling: where v3 measured non-agentic R1–R5, v4
# measures whether real agent loops change the hybrid economics.
#
# The orchestrator (bin/overnight-sweep.sh) runs this YAML THREE TIMES, once
# per strategy, by overriding ``router.strategy`` via --set. All three
# invocations write to the same raw.jsonl; the resume check is keyed on
# (task, route, router_strategy) post-v4 so re-runs are idempotent.
#
# yaml-language-server: $schema=../schema.json

variant_tag: v4-agent-overnight
out_dir: results/runs/17-v4-agent-overnight

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: devstral:24b
  judge: claude-opus-4-7

router:
  strategy: heuristic                      # overridden per-pass by --set
  port: 8787
  banner: true
  prompt_cache: false

benchmark:
  # B = SWE-bench Verified (R6 mini-swe-agent)
  # X = exercism_python  (R7 aider)
  # D = real_dev D1+D5   (R8 opencode)
  categories: [B, X, D]
  routes: [R6, R7, R8]
  seeds: [42]
  smoke: false
  # Cap SWE-bench to the 6 easy-tier tasks the v3 sweep already pinned;
  # cap real_dev to D1+D5 (8 tasks) — D2 (no scorer), D3/D4 (prose) are
  # judge-only and irrelevant for agent-vs-non-agent comparison.
  tasks_per_category: {B: 6, X: 5, D: 8}

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
