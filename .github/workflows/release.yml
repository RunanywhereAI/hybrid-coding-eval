name: Release

# Tag-triggered release. Push a semver tag (e.g. v1.6.0) and this:
#   1. runs the Python + router test suites as a gate, then
#   2. drafts a GitHub Release with auto-generated notes.
#
# It creates a DRAFT on purpose: a maintainer attaches the dataset tarball
# (results-v<tag>.tar.gz) and clicks Publish. This prevents the empty-release
# footgun (a "Latest" release with no dataset attached) while keeping the
# tag -> tested -> release path automated.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Python tests
        run: pytest tests/ -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Router tests
        run: npm test
        working-directory: router

  draft-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists, skipping draft creation."
            exit 0
          fi
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
          echo "::notice::Draft release for $TAG created. Attach results-${TAG}.tar.gz and Publish."
