name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Clone vendored Minions (R4 + R5 routes need it at import time)
        run: |
          mkdir -p vendor
          git clone --depth 1 https://github.com/HazyResearch/minions.git vendor/minions

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run fast tests
        run: pytest tests/ -q -m 'not slow'
